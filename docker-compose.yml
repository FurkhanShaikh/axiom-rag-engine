services:

  # ── Axiom Engine API ──────────────────────────────────────────────────────
  axiom-rag-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: axiom-rag-engine:latest
    container_name: axiom-rag-engine
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override Ollama base URL to reach the sidecar container.
      OLLAMA_API_BASE: http://ollama:11434
      # Wire the cache to the sidecar Redis — falls back to in-memory if unset.
      AXIOM_REDIS_URL: redis://redis:6379/0
      # Retain the last N audit trails in memory for /v1/audits lookups.
      AXIOM_AUDIT_RETENTION: "100"
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Ollama (local LLM sidecar) ────────────────────────────────────────────
  # Comment this section out if you are using only cloud APIs (Anthropic/OpenAI).
  ollama:
    image: ollama/ollama:latest
    container_name: axiom-ollama
    # Run as a non-root numeric UID/GID (no user account required in the image).
    # OLLAMA_MODELS overrides the default /root/.ollama path so the process can
    # write to the volume without needing root access.
    user: "1000:1000"
    environment:
      OLLAMA_MODELS: /models
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Redis (response cache backing store) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: axiom-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Prometheus (metrics scraper) ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: axiom-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - axiom-rag-engine
    restart: unless-stopped

  # ── Grafana (pre-provisioned with Axiom dashboard) ────────────────────────
  # Default login: admin / admin (Grafana prompts to change on first load).
  grafana:
    image: grafana/grafana:latest
    container_name: axiom-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/axiom-engine.json:/var/lib/grafana/dashboards/axiom-engine.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  ollama_models:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
