services:

  # ── Axiom Engine API ──────────────────────────────────────────────────────
  axiom-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: axiom-engine:latest
    container_name: axiom-engine
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override Ollama base URL to reach the sidecar container.
      OLLAMA_API_BASE: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Ollama (local LLM sidecar) ────────────────────────────────────────────
  # Comment this section out if you are using only cloud APIs (Anthropic/OpenAI).
  ollama:
    image: ollama/ollama:latest
    container_name: axiom-ollama
    # Run as a non-root numeric UID/GID (no user account required in the image).
    # OLLAMA_MODELS overrides the default /root/.ollama path so the process can
    # write to the volume without needing root access.
    user: "1000:1000"
    environment:
      OLLAMA_MODELS: /models
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  ollama_models:
    driver: local
