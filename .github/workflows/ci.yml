name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --frozen
      - name: Mypy type checking
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest -m "not integration" --cov=axiom_rag_engine --cov-report=term-missing

  evals-gate:
    # Deterministic quality gates — no LLM keys, no cost. Two checks:
    #   1. Golden set through the retriever/scorer/ranker + pre-LLM
    #      answerability gate (every case must clear its expectation).
    #   2. BM25 retrieval quality over SciFact (recall@k / nDCG / MRR must not
    #      regress) — the baseline hybrid retrieval must beat.
    # The keyed semantic + full e2e evals run nightly (nightly-evals.yml).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --frozen
      - name: Regression gates (golden answerability + BM25 retrieval)
        env:
          AXIOM_ENV: development
        run: uv run python tasks.py evals gate

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --frozen
      - name: Dependency vulnerability scan
        run: uv run pip-audit

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build -t axiom-rag-engine:ci .
