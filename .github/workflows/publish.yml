name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.11

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyproject_version="$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/' | tr -d '\r')"
          echo "tag=$tag  pyproject=$pyproject_version"
          if [ "$tag" != "$pyproject_version" ]; then
            echo "::error::Git tag ($tag) does not match pyproject.toml version ($pyproject_version)."
            exit 1
          fi

      - name: Build package
        run: uv build --no-sources
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    # PEP 440 pre-releases (aN/bN/rcN) publish to PyPI alongside finals —
    # pip installs only final releases by default, so pre-releases are
    # opt-in via `pip install <pkg> --pre` or an explicit version pin.
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI (idempotent)
        run: uv publish --check-url https://pypi.org/simple/
